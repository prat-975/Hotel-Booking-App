spring.application.name=hotel-booking-backend
server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/hotel_booking_db
spring.data.mongodb.auto-index-creation=true

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=StayEaseHotelBookingSecretKey2026MustBeAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000

# Set your Google OAuth Client ID from Google Cloud Console
app.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}

# Email (set MAIL_ENABLED=true and configure SMTP to send welcome emails)
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:StayEase <stayease.booking@gmail.com>}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
